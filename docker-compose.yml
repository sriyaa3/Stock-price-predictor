version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: stock-predictor-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=stock_predictor
    networks:
      - stock-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-predictor-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=stock_predictor
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - stock-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-predictor-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - stock-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  stock-network:
    driver: bridge